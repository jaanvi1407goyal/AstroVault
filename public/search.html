<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search — AstroVault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  nav, main {
  position: relative;
  z-index: 1;
}
  #starfield {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 0;
}

  .modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(11, 14, 26, 0.9);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 30px;
}

.modal-overlay.active { display: flex; }

.modal-content {
  background: var(--deep);
  border: 1px solid var(--line);
  border-radius: 8px;
  max-width: 900px;
  width: 100%;
  max-height: 88vh;
  overflow-y: auto;
  position: relative;
}

.modal-close {
  position: absolute;
  top: 14px;
  right: 18px;
  background: rgba(11, 14, 26, 0.7);
  border: none;
  color: var(--text-main);
  font-size: 1.6rem;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  cursor: pointer;
  z-index: 2;
  line-height: 1;
}

.modal-close:hover { background: var(--error); }

.modal-content img {
  width: 100%;
  max-height: 55vh;
  object-fit: contain;
  background: var(--void);
  display: block;
}

.modal-body { padding: 28px 32px; }

.modal-title {
  font-family: 'Fraunces', serif;
  font-size: 1.4rem;
  margin-bottom: 14px;
}

.modal-desc {
  color: var(--text-muted);
  font-size: 0.95rem;
  line-height: 1.7;
  margin-bottom: 22px;
  white-space: pre-line;
}

/* Make result card images clearly clickable */
.result-card img { cursor: pointer; }

.result-card {
  cursor: pointer;
}


  :root {
    --void: #0b0e1a;
    --deep: #131a2e;
    --gold: #e8c468;
    --nebula: #8b7ff0;
    --text-main: #f1ede4;
    --text-muted: #8b92ab;
    --line: rgba(241, 237, 228, 0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--void);
    color: var(--text-main);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 24px 6vw;
  }

  .logo {
    font-family: 'Fraunces', serif;
    font-size: 1.4rem;
    font-weight: 600;
    text-decoration: none;
    color: var(--text-main);
  }

  .nav-links { display: flex; gap: 32px; list-style: none; }

  .nav-links a {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.95rem;
  }

  .nav-links a:hover { color: var(--gold); }

  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 6vw 100px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 2.2rem;
    margin-bottom: 28px;
    text-align: center;
  }

  .search-bar {
    display: flex;
    gap: 12px;
    max-width: 560px;
    margin: 0 auto 50px;
  }

  .search-bar input {
    flex: 1;
    padding: 14px 18px;
    background: var(--deep);
    border: 1px solid var(--line);
    border-radius: 4px;
    color: var(--text-main);
    font-size: 1rem;
  }

  .search-bar input:focus { outline: none; border-color: var(--gold); }

  .search-bar button {
    padding: 14px 28px;
    background: var(--gold);
    color: var(--void);
    border: none;
    border-radius: 4px;
    font-weight: 600;
    cursor: pointer;
  }

  .search-bar button:hover { opacity: 0.9; }
  .search-bar button:disabled { opacity: 0.6; cursor: not-allowed; }

  .status-text {
    text-align: center;
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    margin-bottom: 30px;
  }

  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 24px;
  }

  .result-card {
    border: 1px solid var(--line);
    border-radius: 8px;
    overflow: hidden;
    background: var(--deep);
    display: flex;
    flex-direction: column;
  }

  .result-card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
  }

  .result-body { padding: 18px; flex: 1; display: flex; flex-direction: column; }

  .result-title {
    font-family: 'Fraunces', serif;
    font-size: 1.05rem;
    margin-bottom: 8px;
  }

  .result-desc {
    color: var(--text-muted);
    font-size: 0.85rem;
    flex: 1;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 14px;
  }

  .save-btn {
    padding: 9px;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    border-radius: 4px;
    font-size: 0.82rem;
    cursor: pointer;
  }

  .save-btn:hover { background: var(--gold); color: var(--void); }
  .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  @media (max-width: 768px) {
    .nav-links { display: none; }
  }
</style>
</head>
<body>
<canvas id="starfield"></canvas>
<nav>
  <a href="index.html" class="logo">AstroVault</a>
  <ul class="nav-links">
    <li><a href="search.html">Search</a></li>
    <li><a href="tonight.html">Tonight's Sky</a></li>
    <li><a href="vault.html">My Vault</a></li>
    <li id="authNavItem"></li>
  </ul>
</nav>

<main>
  <h1>Search the sky</h1>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Try 'Mars', 'Andromeda', 'Saturn'...">
    <button id="searchBtn">Search</button>
  </div>

  <div class="status-text" id="statusText"></div>
  <div class="results-grid" id="resultsGrid"></div>
</main>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-content">
    <button class="modal-close" id="modalClose">&times;</button>
    <img id="modalImage" src="" alt="">
    <div class="modal-body">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-desc" id="modalDesc"></div>
      <button class="save-btn" id="modalSaveBtn">Save to Vault</button>
    </div>
  </div>
</div>

<script>
  // ---------- Starfield background animation ----------
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
let stars = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  stars = Array.from({ length: 150 }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.4 + 0.3,
    opacity: Math.random(),
    speed: Math.random() * 0.015
  }));
}

function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(star => {
    star.opacity += star.speed;
    const twinkle = Math.abs(Math.sin(star.opacity));
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(241, 237, 228, ${twinkle})`;
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();
drawStars();
  // ---------- Dynamic Log In / Log Out nav button ----------
function renderAuthNav() {
  const token = localStorage.getItem('astrovault_token');
  const user = JSON.parse(localStorage.getItem('astrovault_user') || 'null');
  const navItem = document.getElementById('authNavItem');

  if (token && user) {
    navItem.innerHTML = `<button id="navLogoutBtn" style="background:transparent;border:1px solid var(--line);color:var(--text-muted);padding:8px 16px;border-radius:4px;font-size:0.85rem;cursor:pointer;">Log Out</button>`;
    document.getElementById('navLogoutBtn').addEventListener('click', () => {
      localStorage.clear();
      window.location.href = 'index.html';
    });
  } else {
    navItem.innerHTML = `<a href="login.html">Log In</a>`;
  }
}

renderAuthNav();

  const searchInput = document.getElementById('searchInput');
  const searchBtn = document.getElementById('searchBtn');
  const statusText = document.getElementById('statusText');
  const resultsGrid = document.getElementById('resultsGrid');
  let currentResults = []; // holds the full search results so the modal can access untruncated data

  async function runSearch() {
    const query = searchInput.value.trim();
    if (!query) return;

    searchBtn.disabled = true;
    statusText.textContent = 'Searching NASA archives...';
    resultsGrid.innerHTML = '';

    try {
      const res = await fetch(`/api/search?query=${encodeURIComponent(query)}`);
      const data = await res.json();

      if (!res.ok) throw new Error(data.message || 'Search failed');

      if (data.results.length === 0) {
        statusText.textContent = `No results found for "${query}".`;
        return;
      }

      statusText.textContent = `Found ${data.count} results for "${query}"`;
      currentResults = data.results; // save full data for the modal to use

      resultsGrid.innerHTML = data.results.map((item, index) => `
        <div class="result-card" onclick="openModal(${index})">
          <img src="${item.image_url}" alt="${item.title}">
          <div class="result-body">
            <div class="result-title">${item.title}</div>
            <div class="result-desc">${item.description || 'No description available.'}</div>
            <button class="save-btn" onclick='event.stopPropagation(); saveObject(${JSON.stringify(item.title)}, ${JSON.stringify(item.image_url)}, ${JSON.stringify(item.description)})'>
              Save to Vault
            </button>
          </div>
        </div>
      `).join('');

    } catch (error) {
      statusText.textContent = 'Something went wrong. Make sure your server is running.';
    } finally {
      searchBtn.disabled = false;
    }
  }

  async function saveObject(name, imageUrl, description) {
    const token = localStorage.getItem('astrovault_token');

    if (!token) {
      alert('Please log in first to save objects to your vault.');
      window.location.href = 'login.html';
      return;
    }

    try {
      const res = await fetch('/api/vault', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({
          object_name: name,
          object_type: 'search_result',
          nasa_image_url: imageUrl,
          description: description
        })
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.message);

      alert('Saved to your vault!');
    } catch (error) {
      alert('Could not save: ' + error.message);
    }
  }

  function openModal(index) {
    const item = currentResults[index];
    document.getElementById('modalImage').src = item.image_url;
    document.getElementById('modalImage').alt = item.title;
    document.getElementById('modalTitle').textContent = item.title;
    document.getElementById('modalDesc').textContent = item.description || 'No description available.';

    const saveBtn = document.getElementById('modalSaveBtn');
    saveBtn.onclick = () => saveObject(item.title, item.image_url, item.description);

    document.getElementById('modalOverlay').classList.add('active');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
  }

  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modalOverlay').addEventListener('click', (e) => {
    if (e.target.id === 'modalOverlay') closeModal();
  });

  searchBtn.addEventListener('click', runSearch);
  searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') runSearch();
  });
</script>

</body>
</html>
