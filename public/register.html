<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — AstroVault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #0b0e1a;
    --deep: #131a2e;
    --gold: #e8c468;
    --nebula: #8b7ff0;
    --text-main: #f1ede4;
    --text-muted: #8b92ab;
    --line: rgba(241, 237, 228, 0.12);
    --error: #e88a68;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--void);
    color: var(--text-main);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .auth-card {
    width: 100%;
    max-width: 400px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--deep);
    padding: 40px 36px;
  }

  .logo {
    font-family: 'Fraunces', serif;
    font-size: 1.3rem;
    font-weight: 600;
    text-align: center;
    display: block;
    text-decoration: none;
    color: var(--text-main);
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 1.5rem;
    text-align: center;
    margin-bottom: 28px;
    color: var(--text-muted);
  }

  label {
    display: block;
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-bottom: 6px;
    margin-top: 18px;
  }

  input {
    width: 100%;
    padding: 12px 14px;
    background: var(--void);
    border: 1px solid var(--line);
    border-radius: 4px;
    color: var(--text-main);
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
  }

  input:focus {
    outline: none;
    border-color: var(--gold);
  }

  button {
    width: 100%;
    margin-top: 28px;
    padding: 13px;
    background: var(--gold);
    color: var(--void);
    border: none;
    border-radius: 4px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
  }

  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.6; cursor: not-allowed; }

  .message {
    margin-top: 16px;
    font-size: 0.85rem;
    text-align: center;
    display: none;
  }

  .message.error { color: var(--error); display: block; }
  .message.success { color: var(--gold); display: block; }

  .switch-link {
    text-align: center;
    margin-top: 24px;
    font-size: 0.88rem;
    color: var(--text-muted);
  }

  .switch-link a { color: var(--gold); text-decoration: none; }
</style>
</head>
<body>

<div class="auth-card">
  <a href="index.html" class="logo">AstroVault</a>
  <h1>Create your account</h1>

  <form id="registerForm">
    <label for="username">Username</label>
    <input type="text" id="username" required>

    <label for="email">Email</label>
    <input type="email" id="email" required>

    <label for="password">Password</label>
    <input type="password" id="password" required minlength="6">

    <button type="submit" id="submitBtn">Create Account</button>

    <div class="message" id="message"></div>
  </form>

  <div class="switch-link">
    Already have an account? <a href="login.html">Log in</a>
  </div>
</div>

<script>
  const form = document.getElementById('registerForm');
  const messageBox = document.getElementById('message');
  const submitBtn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault(); // stops the page from reloading, which is the default form behavior

    const username = document.getElementById('username').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    submitBtn.disabled = true;
    submitBtn.textContent = 'Creating account...';
    messageBox.className = 'message';

    try {
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password })
      });

      const data = await res.json();

      if (!res.ok) {
        // res.ok is false for 400/500 status codes — this means something went wrong
        throw new Error(data.message || 'Registration failed');
      }

      messageBox.textContent = 'Account created! Redirecting to login...';
      messageBox.className = 'message success';

      setTimeout(() => {
        window.location.href = 'login.html';
      }, 1500);

    } catch (error) {
      messageBox.textContent = error.message;
      messageBox.className = 'message error';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Create Account';
    }
  });
</script>

</body>
</html>
