<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Vault — AstroVault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  .vault-modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(11, 14, 26, 0.9);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 30px;
}

.vault-modal-overlay.active { display: flex; }

.vault-modal-content {
  background: var(--deep);
  border: 1px solid var(--line);
  border-radius: 8px;
  max-width: 700px;
  width: 100%;
  max-height: 88vh;
  overflow-y: auto;
  position: relative;
}

.vault-modal-content .modal-close {
  position: absolute;
  top: 14px;
  right: 18px;
  background: rgba(11, 14, 26, 0.7);
  border: none;
  color: var(--text-main);
  font-size: 1.6rem;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  cursor: pointer;
  z-index: 2;
  line-height: 1;
}

.vault-modal-content .modal-close:hover { background: var(--error); }

.vault-modal-content img {
  width: 100%;
  max-height: 320px;
  object-fit: cover;
  display: block;
}

.vault-modal-body { padding: 28px 32px; }

.vault-modal-type {
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem;
  color: var(--nebula);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.vault-modal-title {
  font-family: 'Fraunces', serif;
  font-size: 1.5rem;
  margin-bottom: 6px;
}

.vault-modal-date {
  color: var(--text-muted);
  font-family: 'Space Mono', monospace;
  font-size: 0.8rem;
  margin-bottom: 24px;
}

.vault-modal-section-label {
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
  margin-top: 20px;
}

.vault-modal-desc {
  color: var(--text-muted);
  font-size: 0.9rem;
  line-height: 1.7;
}

#vaultModalNote {
  width: 100%;
  min-height: 110px;
  padding: 12px 14px;
  background: var(--void);
  border: 1px solid var(--line);
  border-radius: 4px;
  color: var(--text-main);
  font-family: 'Inter', sans-serif;
  font-size: 0.9rem;
  resize: vertical;
  margin-bottom: 12px;
}

#vaultModalSaveNote {
  padding: 10px 22px;
  background: var(--gold);
  color: var(--void);
  border: none;
  border-radius: 4px;
  font-weight: 600;
  cursor: pointer;
  font-size: 0.85rem;
}

.note-status {
  display: inline-block;
  margin-left: 14px;
  color: var(--gold);
  font-family: 'Space Mono', monospace;
  font-size: 0.8rem;
}

.vault-card { cursor: pointer; }

  :root {
    --void: #0b0e1a;
    --deep: #131a2e;
    --gold: #e8c468;
    --nebula: #8b7ff0;
    --text-main: #f1ede4;
    --text-muted: #8b92ab;
    --line: rgba(241, 237, 228, 0.12);
    --error: #e88a68;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--void);
    color: var(--text-main);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 24px 6vw;
  }

  .logo {
    font-family: 'Fraunces', serif;
    font-size: 1.4rem;
    font-weight: 600;
    text-decoration: none;
    color: var(--text-main);
  }

  .nav-links { display: flex; gap: 32px; list-style: none; align-items: center; }
  .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 0.95rem; }
  .nav-links a:hover { color: var(--gold); }

  #logoutBtn {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--text-muted);
    padding: 8px 16px;
    border-radius: 4px;
    font-size: 0.85rem;
    cursor: pointer;
  }
  #logoutBtn:hover { border-color: var(--error); color: var(--error); }

  main {
    max-width: 1000px;
    margin: 0 auto;
    padding: 40px 6vw 100px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 2.2rem;
    margin-bottom: 6px;
  }

  .welcome-line {
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    margin-bottom: 40px;
  }

  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 30px;
    border-bottom: 1px solid var(--line);
  }

  .tab-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    padding: 12px 20px;
    font-size: 0.95rem;
    cursor: pointer;
    border-bottom: 2px solid transparent;
  }

  .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Vault grid */
  .vault-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
  }

  .vault-card {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--deep);
    overflow: hidden;
  }

  .vault-card img { width: 100%; height: 150px; object-fit: cover; }

  .vault-card-body { padding: 16px; }

  .vault-card-title { font-family: 'Fraunces', serif; font-size: 1rem; margin-bottom: 4px; }

  .vault-card-type {
    color: var(--nebula);
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    text-transform: uppercase;
  }

  /* Journal */
  .journal-form {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--deep);
    padding: 24px;
    margin-bottom: 36px;
  }

  .journal-form input, .journal-form textarea {
    width: 100%;
    padding: 12px 14px;
    background: var(--void);
    border: 1px solid var(--line);
    border-radius: 4px;
    color: var(--text-main);
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    margin-bottom: 14px;
  }

  .journal-form textarea { resize: vertical; min-height: 90px; }

  .journal-form button {
    padding: 11px 24px;
    background: var(--gold);
    color: var(--void);
    border: none;
    border-radius: 4px;
    font-weight: 600;
    cursor: pointer;
  }

  .journal-entry {
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 20px 24px;
    margin-bottom: 16px;
    background: var(--deep);
  }

  .journal-entry-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .journal-entry-object { font-family: 'Fraunces', serif; font-size: 1.05rem; }

  .journal-entry-date {
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
  }

  .journal-entry-note { color: var(--text-muted); font-size: 0.9rem; }

  .empty-state {
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
    text-align: center;
    padding: 60px 20px;
    border: 1px dashed var(--line);
    border-radius: 8px;
  }

  @media (max-width: 768px) {
    .nav-links a:not(#logoutBtn) { display: none; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">AstroVault</a>
  <ul class="nav-links">
    <li><a href="search.html">Search</a></li>
    <li><a href="tonight.html">Tonight's Sky</a></li>
    <li id="authNavItem"></li>
  </ul>
</nav>

<main>
  <h1>My Vault</h1>
  <div class="welcome-line" id="welcomeLine"></div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="vault">Saved Objects</button>
    <button class="tab-btn" data-tab="journal">Journal</button>
  </div>

  <div class="tab-panel active" id="vaultPanel">
    <div class="vault-grid" id="vaultGrid">
      <div class="empty-state">Loading your vault...</div>
    </div>
  </div>

  <div class="tab-panel" id="journalPanel">
    <div class="journal-form">
      <input type="text" id="journalObjectName" placeholder="Object name (e.g. Mars, Andromeda)">
      <textarea id="journalNote" placeholder="Write your observation notes..."></textarea>
      <button id="addJournalBtn">Add Entry</button>
    </div>
    <div id="journalList">
      <div class="empty-state">Loading your journal...</div>
    </div>
  </div>
</main>

<div class="vault-modal-overlay" id="vaultModalOverlay">
  <div class="vault-modal-content">
    <button class="modal-close" id="vaultModalClose">&times;</button>
    <img id="vaultModalImage" src="" alt="">
    <div class="vault-modal-body">
      <div class="vault-modal-type" id="vaultModalType"></div>
      <div class="vault-modal-title" id="vaultModalTitle"></div>
      <div class="vault-modal-date" id="vaultModalDate"></div>

      <div class="vault-modal-section-label">Description</div>
      <div class="vault-modal-desc" id="vaultModalDesc"></div>

      <div class="vault-modal-section-label">My Notes</div>
      <textarea id="vaultModalNote" placeholder="Write your thoughts, observations, or facts about this object..."></textarea>
      <button id="vaultModalSaveNote">Save Note</button>
      <div class="note-status" id="noteStatus"></div>
    </div>
  </div>
</div>

<script>
function renderAuthNav() {
  const navItem = document.getElementById('authNavItem');
  navItem.innerHTML = `<button id="navLogoutBtn" style="background:transparent;border:1px solid var(--line);color:var(--text-muted);padding:8px 16px;border-radius:4px;font-size:0.85rem;cursor:pointer;">Log Out</button>`;
  document.getElementById('navLogoutBtn').addEventListener('click', () => {
    localStorage.clear();
    window.location.href = 'index.html';
  });
}
function openVaultModal(index) {
  const obj = window.currentVaultObjects[index];

  document.getElementById('vaultModalImage').src = obj.nasa_image_url || '';
  document.getElementById('vaultModalImage').style.display = obj.nasa_image_url ? 'block' : 'none';
  document.getElementById('vaultModalType').textContent = obj.object_type;
  document.getElementById('vaultModalTitle').textContent = obj.object_name;
  document.getElementById('vaultModalDate').textContent = 'Saved on ' + new Date(obj.saved_at).toLocaleDateString();
  document.getElementById('vaultModalDesc').textContent = obj.description || 'No description available.';
  document.getElementById('vaultModalNote').value = obj.personal_note || '';
  document.getElementById('noteStatus').textContent = '';

  // Remember which object's note we're editing, so Save knows the right ID
  document.getElementById('vaultModalSaveNote').dataset.objectId = obj.id;

  document.getElementById('vaultModalOverlay').classList.add('active');
}

function closeVaultModal() {
  document.getElementById('vaultModalOverlay').classList.remove('active');
}

document.getElementById('vaultModalClose').addEventListener('click', closeVaultModal);
document.getElementById('vaultModalOverlay').addEventListener('click', (e) => {
  if (e.target.id === 'vaultModalOverlay') closeVaultModal();
});

document.getElementById('vaultModalSaveNote').addEventListener('click', async function() {
  const objectId = this.dataset.objectId;
  const note = document.getElementById('vaultModalNote').value;
  const statusEl = document.getElementById('noteStatus');

  try {
    const res = await fetch(`/api/vault/${objectId}`, {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({ personal_note: note })
    });

    if (!res.ok) throw new Error('Failed to save');

    statusEl.textContent = 'Saved!';
    setTimeout(() => { statusEl.textContent = ''; }, 2000);

    // Update our local copy too, so it's correct if the modal is reopened without a full page refresh
    const obj = window.currentVaultObjects.find(o => o.id == objectId);
    if (obj) obj.personal_note = note;

  } catch (error) {
    statusEl.textContent = 'Failed to save.';
  }
});

  const token = localStorage.getItem('astrovault_token');
  const user = JSON.parse(localStorage.getItem('astrovault_user') || 'null');

  // ---------- Protect this page: redirect if not logged in ----------
  if (!token || !user) {
    window.location.href = 'login.html';
  }

  document.getElementById('welcomeLine').textContent = `Logged in as ${user.username}`;
renderAuthNav();

  // ---------- Tab switching ----------
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(btn.dataset.tab + 'Panel').classList.add('active');
    });
  });

  // ---------- Load saved objects ----------
  async function loadVault() {
    const grid = document.getElementById('vaultGrid');
    try {
     const res = await fetch('/api/vault', {
  headers: { 'Authorization': `Bearer ${token}` },
  cache: 'no-store'
});
      const data = await res.json();

      if (data.objects.length === 0) {
        grid.innerHTML = `<div class="empty-state">You haven't saved anything yet. Go search for planets and stars to add some!</div>`;
        return;
      }

      window.currentVaultObjects = data.objects; // store full data so the modal can access it

grid.innerHTML = data.objects.map((obj, index) => `
  <div class="vault-card" onclick="openVaultModal(${index})">
    ${obj.nasa_image_url ? `<img src="${obj.nasa_image_url}" alt="${obj.object_name}">` : ''}
    <div class="vault-card-body">
      <div class="vault-card-title">${obj.object_name}</div>
      <div class="vault-card-type">${obj.object_type}</div>
    </div>
  </div>
`).join('');

    } catch (error) {
      grid.innerHTML = `<div class="empty-state">Couldn't load your vault. Make sure your server is running.</div>`;
    }
  }

  // ---------- Load journal entries ----------
  async function loadJournal() {
  const list = document.getElementById('journalList');
  try {
    const res = await fetch('/api/journal', {
      headers: { 'Authorization': `Bearer ${token}` },
      cache: 'no-store'
    });
      const data = await res.json();

      if (data.entries.length === 0) {
        list.innerHTML = `<div class="empty-state">No journal entries yet. Write your first observation above.</div>`;
        return;
      }

      list.innerHTML = data.entries.map(entry => `
        <div class="journal-entry">
          <div class="journal-entry-header">
            <div class="journal-entry-object">${entry.object_name}</div>
            <div class="journal-entry-date">${new Date(entry.created_at).toLocaleDateString()}</div>
          </div>
          <div class="journal-entry-note">${entry.note}</div>
        </div>
      `).join('');

    } catch (error) {
      list.innerHTML = `<div class="empty-state">Couldn't load your journal.</div>`;
    }
  }

  // ---------- Add a journal entry ----------
  document.getElementById('addJournalBtn').addEventListener('click', async () => {
    const object_name = document.getElementById('journalObjectName').value.trim();
    const note = document.getElementById('journalNote').value.trim();

    if (!object_name || !note) {
      alert('Please fill in both the object name and your notes.');
      return;
    }

    try {
      const res = await fetch('/api/journal', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ object_name, note })
      });

      if (!res.ok) throw new Error('Failed to save entry');

      document.getElementById('journalObjectName').value = '';
      document.getElementById('journalNote').value = '';
      loadJournal(); // refresh the list to show the new entry

    } catch (error) {
      alert('Could not save journal entry.');
    }
  });

  loadVault();
  loadJournal();
</script>

</body>
</html>
